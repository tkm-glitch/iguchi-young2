<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動報告 | 井口ヤングベースボールクラブ</title>
  <meta name="description" content="井口ヤングベースボールクラブの試合結果・練習風景・イベントの活動報告一覧です。">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header" id="site-header"></header>

<div class="page-hero">
  <p class="label">ACTIVITY REPORT</p>
  <h1>活動報告</h1>
</div>

<section class="section">
  <div class="container">
    <!-- カテゴリフィルター -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;" id="filter-btns">
      <button class="btn btn-green" style="padding:6px 16px;font-size:13px;" onclick="filterNews('all',this)">すべて</button>
      <button class="btn btn-outline" style="padding:6px 16px;font-size:13px;" onclick="filterNews('試合',this)">⚾ 試合</button>
      <button class="btn btn-outline" style="padding:6px 16px;font-size:13px;" onclick="filterNews('練習',this)">🏃 練習</button>
      <button class="btn btn-outline" style="padding:6px 16px;font-size:13px;" onclick="filterNews('イベント',this)">🎉 イベント</button>
      <button class="btn btn-outline" style="padding:6px 16px;font-size:13px;" onclick="filterNews('お知らせ',this)">📢 お知らせ</button>
    </div>

    <!-- 記事一覧（news-list.js から自動生成） -->
    <div class="news-grid" id="news-auto-list" data-limit="99" data-base=""></div>
  </div>
</section>

<section class="cta-section">
  <h2>最新の練習風景はInstagramで！</h2>
  <p>試合や練習の写真をほぼ毎週投稿しています。ぜひフォローしてください。</p>
  <div class="cta-btns">
    <a class="btn btn-white btn-lg" href="#" data-insta-href>📸 Instagramをフォロー</a>
    <a class="btn btn-line btn-lg" href="#" data-line-href>💬 LINEで体験相談</a>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>
<div id="fixed-line"></div>

<script src="../config.js"></script>
<script src="../news-list.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
  renderHeader("../");
  renderFooter("../");
  renderFixedLine();

  // カテゴリフィルター
  function filterNews(cat, btn) {
    document.querySelectorAll("#filter-btns button").forEach(b => {
      b.className = "btn btn-outline";
      b.style.cssText = "padding:6px 16px;font-size:13px;";
    });
    btn.className = "btn btn-green";
    btn.style.cssText = "padding:6px 16px;font-size:13px;";

    const cards = document.querySelectorAll("#news-auto-list .news-card");
    cards.forEach(card => {
      if (cat === "all") {
        card.style.display = "";
      } else {
        const badge = card.querySelector(".cat-badge");
        card.style.display = (badge && badge.textContent === cat) ? "" : "none";
      }
    });
  }
</script>
</body>
</html>
